version: "3"
services:
  api:
    image: cosis-api:v1
    container_name: api
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
  postgres:
    image: postgres:15-alpine
    environment: POSTGRES_PASSWORD="12345"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    container_name: redis
    image: redis:7-alpine

volumes:
  postgres-data:
